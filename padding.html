<!DOCTYPE html>
<html>
<head>
<style>

.box1{
  width:200px;
  height:100px;
  background-color:lightblue;
  padding:20px;
}

.box2{
  width:200px;
  height:100px;
  background-color:lightgreen;
  margin:20px;
}

.box3{
  width:200px;
  height:100px;
  background-color:lightcoral;
  margin:20px;
  padding:20px;
  border:3px solid black;
}

</style>
</head>

<body>

<div class="box1">Box with Padding</div>

<div class="box2">Box with Margin</div>

<div class="box3">Box with Margin, Padding and Border</div>

</body>
</html>
